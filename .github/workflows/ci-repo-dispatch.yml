name: CI - App3 API

on:
  push:
    branches: [main]

jobs:
  trigger-template:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repository_dispatch with PAT
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}  # Même PAT que App 2
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'nohaila1231',
                repo: 'template-pro',
                event_type: 'run-ci',
                client_payload: {
                  'target-repo': 'nohaila1231/app-3-frontend',
                  'run-tests': true
                }
              });
              
              console.log('✅ repository_dispatch envoyé avec succès!');
              
            } catch (error) {
              console.error('❌ Erreur:', error.message);
              throw error;
            }
